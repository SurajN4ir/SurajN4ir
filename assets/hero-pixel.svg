<svg viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg" font-family="monospace">
  <style>
    .bg { fill: #F5EDE3; }
    .desk { fill: #C1654A; }
    .mat { fill: #8A9A7E; opacity: 0.35; }
    .screen { fill: #2B2320; }
    .bezel { fill: #3d332c; }
    .body { fill: #2B2320; }
    .skin { fill: #C1654A; }
    .cursor { fill: #8A9A7E; animation: blink 1.1s steps(1) infinite; }
    .codeline { fill: #8A9A7E; animation: type 4s ease-in-out infinite; }
    .codeline2 { fill: #C1654A; animation: type 4s ease-in-out infinite 1.3s; }
    .ball { animation: bounce 2.4s ease-in-out infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    @keyframes type {
      0% { width: 0; }
      30% { width: var(--w, 60px); }
      70% { width: var(--w, 60px); }
      100% { width: 0; }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-14px); }
    }
  </style>

  <rect class="bg" width="900" height="260"/>
  <rect class="mat" x="60" y="190" width="780" height="20" rx="4"/>
  <rect class="desk" x="0" y="205" width="900" height="55"/>

  <!-- Monitor -->
  <rect class="bezel" x="330" y="70" width="220" height="140" rx="6"/>
  <rect class="screen" x="342" y="82" width="196" height="110" rx="2"/>
  <rect class="codeline" x="356" y="98" width="60" height="6" style="--w:60px"/>
  <rect class="codeline2" x="356" y="112" width="80" height="6" style="--w:80px"/>
  <rect class="codeline" x="356" y="126" width="40" height="6" style="--w:40px"/>
  <rect class="cursor" x="356" y="140" width="8" height="6"/>
  <rect class="bezel" x="415" y="210" width="10" height="16"/>
  <rect class="bezel" x="395" y="224" width="50" height="6" rx="2"/>

  <!-- Pixel Suraj (simple seated figure) -->
  <rect class="body" x="230" y="150" width="40" height="55"/>
  <rect class="skin" x="238" y="120" width="24" height="24"/>
  <rect class="body" x="234" y="118" width="32" height="10"/>
  <rect class="body" x="205" y="160" width="28" height="12"/>
  <rect class="body" x="267" y="160" width="28" height="12"/>

  <!-- Football (bouncing) -->
  <g class="ball">
    <circle cx="640" cy="190" r="12" fill="#F5EDE3" stroke="#2B2320" stroke-width="2"/>
    <path d="M636 184 l8 0 l4 6 l-4 6 l-8 0 l-4 -6 z" fill="#2B2320"/>
  </g>
</svg>
